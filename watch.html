<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<script src="/config.js?v=1"></script>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!-- NO-REFERRER, page-wide: the source CDN 403s the mp4 stream + poster when a foreign
     Referer is sent, but serves fine with none. <video> has no referrerpolicy attribute
     in the HTML spec, so the meta tag is the only reliable way to strip it from media
     requests. NOTE for later: when ad zones go live on this page, check whether the ad
     network needs the referrer for domain verification. -->
<meta name="referrer" content="no-referrer" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://api.34vault.com" />
<link rel="preconnect" href="https://cdn.34vault.com" />
<link rel="stylesheet" href="/shared.css" />
<title>Loading... | 34VaultVideo</title>
<meta name="description" content="" />
<meta name="rating" content="adult" />
<meta property="og:type" content="video.other" />
<meta property="og:site_name" content="34VaultVideo" />
<meta property="og:title" content="" />
<meta property="og:description" content="" />
<meta property="og:image" content="" />
<meta property="og:url" content="" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="" />
<meta name="twitter:image" content="" />

<style>
body{padding-top:var(--topH);padding-bottom:32px}
.page{max-width:1100px;margin:0 auto;padding:12px 14px 40px}

/* Brand — gradient "Vault"+"Video" like the homepage */
.brand span{background:var(--grad-accent,linear-gradient(135deg,#ffce54,var(--accent) 55%,#c07c08));-webkit-background-clip:text;background-clip:text;color:transparent}

/* ── PLAYER ── */
.player-shell{
  position:relative;width:100%;aspect-ratio:16/9;
  background:#000;border-radius:14px;overflow:hidden;
  border:1px solid var(--border);box-shadow:var(--shadow);
}
.player-shell video{width:100%;height:100%;display:block;background:#000;outline:none}
.player-shell iframe{width:100%;height:100%;display:block;background:#000;border:0}

/* Player controls row (speed / autoplay / next / download) */
.p-ctl{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:10px}
.pc-btn{height:32px;padding:0 14px;border-radius:9px;background:var(--panel2);border:1px solid var(--border);color:var(--text);font-size:12px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:6px;text-decoration:none;transition:border-color .15s}
.pc-btn:hover{border-color:var(--accent)}
.pc-speed{display:inline-flex;gap:3px;background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:3px}
.pc-speed button{height:24px;padding:0 9px;border:none;border-radius:6px;background:none;color:var(--muted);font-size:11px;font-weight:800;cursor:pointer}
.pc-speed button.on{background:var(--accent);color:#241a08}
.pc-auto{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;user-select:none;margin-left:auto}
.pc-auto input{accent-color:var(--accent);width:15px;height:15px}
.pc-keys{font-size:10.5px;color:var(--muted);opacity:.7;font-weight:600;width:100%;margin-top:2px}
@media(max-width:600px){.pc-keys{display:none}}

/* Quality pills */
.q-row{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 2px;align-items:center}
.q-label{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-right:2px}
.q-pill{
  height:28px;padding:0 12px;border-radius:999px;
  background:var(--panel2);border:1px solid var(--border);
  color:var(--muted);font-size:11px;font-weight:800;cursor:pointer;
  transition:all .15s;
}
.q-pill:hover{border-color:var(--accent);color:var(--text)}
.q-pill.on{background:var(--accent);border-color:var(--accent);color:#000}

/* Resolve-error card (overlays the player, poster stays visible behind it) */
.err-card{
  position:absolute;inset:0;z-index:5;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  text-align:center;padding:20px;
  background:rgba(10,11,14,.88);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.err-ico{font-size:32px}
.err-t{font-size:15px;font-weight:900}
.err-s{font-size:12px;color:var(--muted);max-width:360px;line-height:1.5}
.src-btn{
  height:40px;padding:0 20px;border-radius:10px;margin-top:4px;
  background:var(--accent);color:#000;font-size:13px;font-weight:800;
  display:inline-flex;align-items:center;gap:8px;transition:background .15s;
}
.src-btn:hover{background:var(--accent2)}

/* First-view hosting overlay (poster stays visible behind it) */
.prep{
  position:absolute;inset:0;z-index:6;
  display:flex;align-items:center;justify-content:center;padding:20px;
  background:rgba(10,11,14,.82);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
.prep-box{display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center}
.prep-spin{
  width:42px;height:42px;border-radius:50%;
  border:3px solid rgba(255,255,255,.12);
  border-top-color:var(--accent);
  animation:prep-spin .8s linear infinite;
}
@keyframes prep-spin{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){.prep-spin{animation-duration:2s}}
.prep-msg{font-size:15px;font-weight:900}
.prep-sub{font-size:12px;color:var(--muted);max-width:340px;line-height:1.5}

/* ── META ── */
.v-title{font-size:18px;font-weight:900;line-height:1.25;margin-top:10px;letter-spacing:-.2px}
.v-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);font-weight:700;margin-top:7px}
.v-meta span{display:inline-flex;align-items:center;gap:5px}
.v-meta svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;opacity:.8}
.v-by{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px}
.v-artist{
  display:inline-flex;align-items:center;height:26px;padding:0 12px;border-radius:999px;
  font-size:12px;font-weight:800;text-decoration:none;
  background:var(--accent-10,rgba(245,158,11,.1));border:1px solid var(--accent-22,rgba(245,158,11,.25));
  background-image:var(--grad-accent);-webkit-background-clip:text;background-clip:text;color:transparent;
}
.v-artist::before{content:"@";opacity:.7;margin-right:1px}
.v-artist:hover{border-color:var(--accent)}
.v-cats{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px}
.v-cat{
  display:inline-flex;align-items:center;height:28px;padding:0 13px;border-radius:8px;
  font-size:12px;font-weight:800;text-decoration:none;color:#2a1500;
  background:var(--grad-accent,linear-gradient(135deg,#ffce54,var(--accent) 55%,#c07c08));
  box-shadow:0 4px 12px -6px var(--accent-45,rgba(245,158,11,.5));
  transition:transform .12s}
.v-cat:hover{transform:translateY(-1px)}
.v-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.v-tag{
  height:24px;padding:0 10px;border-radius:999px;
  background:var(--panel2);border:1px solid var(--border);
  font-size:11px;font-weight:700;color:var(--muted);
  display:inline-flex;align-items:center;cursor:pointer;transition:all .15s;
}
.v-tag:hover{border-color:var(--accent);color:var(--text)}

/* Ad slot (gated behind window.ADS_ENABLED — off for launch) */
.ad-slot{margin:20px 0 4px;display:flex;align-items:center;justify-content:center}
.ad-slot:empty{display:none}

/* ── MORE VIDEOS ── */
.sec{margin-top:26px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.sec-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);display:flex;align-items:center;gap:6px}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:600px){.grid{grid-template-columns:repeat(3,1fr);gap:12px}}
@media(min-width:900px){.grid{grid-template-columns:repeat(4,1fr);gap:14px}}

/* Card — same component as the homepage (16/9 cover + duration chip + views) */
.vcard{
  border-radius:14px;background:var(--panel);
  border:1px solid var(--border);overflow:hidden;
  position:relative;display:flex;flex-direction:column;
  transition:transform .2s,border-color .2s,box-shadow .2s;
  cursor:pointer;min-width:0;
}
.vcard:hover{
  transform:translateY(-5px);
  border-color:var(--accent-45,rgba(245,158,11,.5));
  box-shadow:0 16px 40px rgba(0,0,0,.55),0 0 0 1px var(--accent-10,rgba(245,158,11,.12));
}
.c-cover{position:relative;overflow:hidden;aspect-ratio:16/9;background:#0d1018;flex-shrink:0}
.c-cover::after{
  content:"";position:absolute;left:0;right:0;bottom:0;height:38%;
  background:linear-gradient(180deg,transparent,rgba(6,7,11,.72));
  pointer-events:none;z-index:1;
}
.c-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s cubic-bezier(.4,0,.2,1)}
.vcard:hover .c-img{transform:scale(1.07)}
.c-dur{
  position:absolute;bottom:8px;right:8px;z-index:2;
  height:20px;padding:0 8px;border-radius:7px;
  background:rgba(10,11,14,.72);border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  color:#dfe3ee;font-size:9.5px;font-weight:800;
  display:flex;align-items:center;gap:4px;
}
.c-dur svg{width:10px;height:10px;fill:currentColor;stroke:none;opacity:.85}
.c-title{
  padding:9px 9px 0;
  font-size:11px;font-weight:800;color:var(--text);line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;
  height:calc(9px + 2*11px*1.3);
}
.c-foot{padding:6px 9px 9px;display:flex;align-items:center;justify-content:flex-end}
.c-views{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:800;color:var(--text)}
.c-views svg{width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;opacity:.6}

.loading{text-align:center;padding:60px 20px;color:var(--muted)}
.loading .spinner{margin:0 auto 12px}

/* ── UP NEXT (autoplay overlay when the video ends) ── */
.upnext{
  position:absolute;inset:0;z-index:7;
  display:flex;align-items:center;justify-content:center;padding:18px;
  background:rgba(8,9,13,.86);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  animation:un-in .25s ease;
}
@keyframes un-in{from{opacity:0}to{opacity:1}}
@media (prefers-reduced-motion:reduce){.upnext{animation:none}}
.un-box{width:100%;max-width:440px;text-align:center}
.un-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:12px}
.un-card{
  display:flex;gap:12px;align-items:center;text-align:left;
  background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:10px;
  cursor:pointer;transition:border-color .15s,transform .15s;
}
.un-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.un-thumb{position:relative;width:130px;flex-shrink:0;aspect-ratio:16/9;border-radius:8px;overflow:hidden;background:#0d1018}
.un-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.un-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.un-play svg{width:30px;height:30px;fill:#fff;filter:drop-shadow(0 2px 6px rgba(0,0,0,.6))}
.un-ring{
  position:absolute;top:6px;right:6px;min-width:26px;height:26px;padding:0 7px;border-radius:999px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(10,11,14,.72);border:1px solid rgba(255,255,255,.14);
  font-size:11px;font-weight:900;color:#fff;
}
.un-info{min-width:0;flex:1}
.un-info .un-k{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:3px}
.un-title{font-size:13.5px;font-weight:800;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.un-actions{display:flex;gap:8px;justify-content:center;margin-top:14px}
.un-btn{
  height:38px;padding:0 20px;border-radius:10px;font-size:12px;font-weight:800;
  background:var(--panel2);border:1px solid var(--border);color:var(--text);cursor:pointer;transition:all .15s;
}
.un-btn:hover{border-color:var(--accent)}
.un-btn.primary{background:var(--accent);border-color:var(--accent);color:#000}
.un-btn.primary:hover{background:var(--accent2)}
</style>
</head>
<body><noscript><div style="padding:40px 20px;text-align:center;font-family:sans-serif;color:#f0f0f0;background:#0a0b0e;min-height:100vh"><h1>34VaultVideo</h1><p style="margin-top:16px;color:#8b8fa8">This site requires JavaScript to function. Please enable JavaScript in your browser settings.</p></div></noscript>

<div class="topbar">
  <div class="topbar-inner">
    <div class="ico-btn" onclick="history.length>1&&document.referrer.includes('34vaultvideo')?history.back():location.href='index.html'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
    <div class="brand" onclick="location.href='index.html'">34<span>Vault</span><span>Video</span></div>
    <div class="spacer"></div>
    <div class="desktop-nav"><a href="index.html">Videos</a><a href="artists.html">Artists</a><a href="upload.html">Upload</a><a href="https://34vault.com/" rel="noopener">Comics</a></div>
    <div id="acctMount"></div>
  </div>
</div>

<div class="page" id="content">
  <div class="loading"><div class="spinner"></div>Loading...</div>
</div>

<script>
window.ADS_ENABLED = false; // TODO: enable after the new ExoClick account zones for 34vaultvideo.com are created (see the ads.js comment block at the bottom of this file).

const API=window.__API__||"";
const slug=new URLSearchParams(location.search).get("slug");

let quals=[], curQ=-1, _nextVideo=null;

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function fmtNum(n){n=Number(n||0);if(n>=1e6)return(n/1e6).toFixed(1).replace(/\.0$/,"")+"M";if(n>=1e3)return(n/1e3).toFixed(1).replace(/\.0$/,"")+"k";return String(n)}
function fmtDur(sec){
  sec=Math.max(0,Math.floor(Number(sec)||0));
  const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60;
  if(h) return h+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
  return m+":"+String(s).padStart(2,"0");
}
function normTags(t){ if(!t)return[]; if(Array.isArray(t))return t.map(x=>String(x).trim()).filter(Boolean); return String(t).split(",").map(x=>x.trim()).filter(Boolean); }

const PLAY_ICO='<svg viewBox="0 0 24 24"><polygon points="7 4 20 12 7 20 7 4"/></svg>';
const NO_THUMB="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22320%22 height=%22180%22%3E%3Crect fill=%22%230d1018%22 width=%22320%22 height=%22180%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%231a1e2a%22 font-size=%2214%22 font-family=%22sans-serif%22%3ENo Thumb%3C/text%3E%3C/svg%3E";

// CDN-direct thumbs (no API 302 hop); fall back to the API proxy (mirrors on first
// hit), then the placeholder.
const CDN_THUMBS="https://cdn.34vault.com/thumbs";
window.__thumbFall=function(img,sid){
  var stage=img.dataset.p||"0";
  // Stage 0: bypass a cached error at the edge for THIS exact URL before assuming
  // the object is actually missing (verified live: same URL 503s bare, 200s with
  // a cache-busting query string).
  if(stage==="0"){ img.dataset.p="1"; img.src=img.src.split("?")[0]+"?cb="+Date.now(); return; }
  if(stage==="1"&&sid){ img.dataset.p="2"; img.src=API+"/api/thumb/"+sid; return; }
  img.onerror=null; img.src=NO_THUMB;
};
function thumbSrc(x){ return x&&x.sourceId?CDN_THUMBS+"/"+x.sourceId+".jpg":((x&&x.thumbUrl)||NO_THUMB); }

function vcard(x){
  return `<div class="vcard" onclick="location.href='watch.html?slug=${encodeURIComponent(x.slug)}'">
    <div class="c-cover">
      <img class="c-img" src="${esc(thumbSrc(x))}" alt="${esc(x.title||"")}" loading="lazy" decoding="async" onerror="__thumbFall(this,'${esc(String(x.sourceId||""))}')" />
      ${x.duration?`<div class="c-dur">${PLAY_ICO}${fmtDur(x.duration)}</div>`:""}
    </div>
    <div class="c-title">${esc(x.title||"Untitled")}</div>
    <div class="c-foot">
      <span class="c-views"><svg viewBox="0 0 24 24"><path d="M2 12c2.5-5 6-7.5 10-7.5S19.5 7 22 12c-2.5 5-6 7.5-10 7.5S4.5 17 2 12Z"/><circle cx="12" cy="12" r="2.6"/></svg>${fmtNum(x.views)}</span>
    </div>
  </div>`;
}

// ── UP NEXT ──────────────────────────────────────────────────────────────────
// When the current video ends, surface the top related video with an 8s countdown
// and auto-advance — the "keep watching" loop that multiplies pageviews (and ad
// impressions). Navigation is a fresh view; we pass &autoplay=1 so the next page
// tries to start playing immediately (browsers may still gate autoplay-with-sound).
let _upNextTimer=null;
function upNextUrl(next){ return "watch.html?slug="+encodeURIComponent(next.slug)+"&autoplay=1"; }
function setupUpNext(vid,next){
  if(!vid||!next||!next.slug) return;
  vid.addEventListener("ended",function(){
    if(localStorage.getItem("vv_autonext")!=="0") showUpNext(next);
  });
}
function showUpNext(next){
  const shell=document.getElementById("playerShell");
  if(!shell||document.getElementById("upNext")) return;
  // API-proxy URL on purpose: it always resolves (mirrors to R2 on first hit) and
  // was PRELOADED when the related list arrived, so it renders instantly here.
  const thumb=next.sourceId?API+"/api/thumb/"+next.sourceId:(next.thumbUrl||NO_THUMB);
  const ov=document.createElement("div");
  ov.className="upnext"; ov.id="upNext";
  ov.innerHTML=`
    <div class="un-box">
      <div class="un-label">Up next</div>
      <div class="un-card" id="unCard">
        <div class="un-thumb">
          <img src="${esc(thumb)}" alt="" onerror="__thumbFall(this,'${esc(String(next.sourceId||""))}')"/>
          <div class="un-play">${PLAY_ICO}</div>
          <div class="un-ring" id="unNum">8</div>
        </div>
        <div class="un-info">
          <div class="un-k">Playing next</div>
          <div class="un-title">${esc(next.title||"Untitled")}</div>
        </div>
      </div>
      <div class="un-actions">
        <button class="un-btn primary" id="unGo">Play now</button>
        <button class="un-btn" id="unCancel">Cancel</button>
      </div>
    </div>`;
  shell.appendChild(ov);
  const go=()=>{ location.href=upNextUrl(next); };
  ov.querySelector("#unGo").addEventListener("click",go);
  ov.querySelector("#unCard").addEventListener("click",go);
  ov.querySelector("#unCancel").addEventListener("click",cancelUpNext);
  let n=8;
  _upNextTimer=setInterval(()=>{
    n--; const el=document.getElementById("unNum"); if(el)el.textContent=String(n);
    if(n<=0){ clearInterval(_upNextTimer); go(); }
  },1000);
}
function cancelUpNext(){
  if(_upNextTimer){ clearInterval(_upNextTimer); _upNextTimer=null; }
  const ov=document.getElementById("upNext"); if(ov)ov.remove();
}

function renderPills(){
  const row=document.getElementById("qRow");
  if(!row) return;
  if(!quals.length){ row.innerHTML=""; return; }
  row.innerHTML='<span class="q-label">Quality</span>'+quals.map((q,i)=>
    `<button type="button" class="q-pill${i===curQ?" on":""}" data-i="${i}">${esc(q.label)}</button>`
  ).join("");
  row.querySelectorAll(".q-pill").forEach(b=>{
    b.addEventListener("click",()=>setQuality(Number(b.dataset.i)));
  });
}

function setQuality(i){
  if(i===curQ||!quals[i]) return;
  const vid=document.getElementById("vid");
  if(!vid) return;
  const t=vid.currentTime||0;
  const wasPlaying=!vid.paused&&!vid.ended;
  curQ=i;
  renderPills();
  vid.src=quals[i].url;
  vid.load();
  vid.addEventListener("loadedmetadata",function once(){
    vid.removeEventListener("loadedmetadata",once);
    try{ vid.currentTime=t; }catch(e){}
    if(wasPlaying) vid.play().catch(()=>{});
  });
}

function showResolveError(v){
  const shell=document.getElementById("playerShell");
  if(!shell) return;
  const o=document.createElement("div");
  o.className="err-card";
  o.innerHTML=`
    <div class="err-ico">⚠️</div>
    <div class="err-t">Playback unavailable</div>
    <div class="err-s">The stream couldn't be loaded right now. It may be temporarily down — you can watch this video on the source site instead.</div>
    <a class="src-btn" href="${esc(v.sourceUrl||"#")}" target="_blank" rel="noopener nofollow">Watch on source
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </a>`;
  shell.appendChild(o);
  const row=document.getElementById("qRow");
  if(row) row.innerHTML="";
}

// First-view hosting: ask the server to mirror this video into our CDN, then poll
// until it's playable and start it. Shows a lightweight "preparing" overlay.
async function prepareOnDemand(slug,vid){
  const shell=document.getElementById("playerShell");
  if(!shell) return;
  const ov=document.createElement("div");
  ov.className="prep";
  ov.innerHTML=`<div class="prep-box"><div class="prep-spin"></div><div class="prep-msg">Preparing this video…</div><div class="prep-sub">First play loads it into our player — just a few seconds.</div></div>`;
  shell.appendChild(ov);
  const setMsg=(m,s)=>{ const a=ov.querySelector(".prep-msg"),b=ov.querySelector(".prep-sub"); if(a)a.textContent=m; if(b)b.innerHTML=s||""; };
  const go=(url)=>{ ov.remove(); vid.src=url; vid.load(); vid.play().catch(()=>{}); };
  try{
    const r=await fetch(`${API}/api/videos/slug/${encodeURIComponent(slug)}/host-now`,{method:"POST"});
    const d=await r.json().catch(()=>({}));
    if(d&&d.ready&&d.videoUrl){ go(d.videoUrl); return; }
    if(r.status===503){ setMsg("High demand right now…","<button class=\"src-btn\" onclick=\"location.reload()\">Try again</button>"); return; }
  }catch(e){}
  const started=Date.now();
  const timer=setInterval(async()=>{
    if(Date.now()-started>120000){ clearInterval(timer); setMsg("This one’s taking a while.","<button class=\"src-btn\" onclick=\"location.reload()\">Retry</button>"); return; }
    try{
      const r=await fetch(`${API}/api/videos/slug/${encodeURIComponent(slug)}?_=${Date.now()}`);
      const d=await r.json(); const vv=(d&&d.video)||d;
      if(vv&&vv.videoUrl){ clearInterval(timer); go(vv.videoUrl); }
    }catch(e){}
  },2500);
}

async function load(){
  if(!slug){location.href="index.html";return}
  try{
    const r=await fetch(`${API}/api/videos/slug/${encodeURIComponent(slug)}`);
    if(!r.ok) throw 0;
    const d=await r.json();
    const v=d.video||d;
    if(!v||!v.slug) throw 0;

    // SEO / social meta
    const pageTitle=`${v.title||"Video"} | 34VaultVideo`;
    document.title=pageTitle;
    const desc=`Watch ${v.title||"this video"} free in up to 1080p on 34VaultVideo.`.slice(0,160);
    const pageUrl=`https://34vaultvideo.com/watch.html?slug=${encodeURIComponent(v.slug)}`;
    document.querySelector('meta[name="description"]')?.setAttribute("content",desc);
    document.querySelector('meta[property="og:title"]')?.setAttribute("content",pageTitle);
    document.querySelector('meta[property="og:description"]')?.setAttribute("content",desc);
    document.querySelector('meta[name="twitter:title"]')?.setAttribute("content",pageTitle);
    document.querySelector('meta[property="og:url"]')?.setAttribute("content",pageUrl);
    document.querySelector('link[rel="canonical"]')?.setAttribute("href",pageUrl);
    if(v.thumbUrl){
      document.querySelector('meta[property="og:image"]')?.setAttribute("content",v.thumbUrl);
      document.querySelector('meta[name="twitter:image"]')?.setAttribute("content",v.thumbUrl);
    }

    const tags=normTags(v.tags);

    document.getElementById("content").innerHTML=`
      <div class="player-shell" id="playerShell">
        <video id="vid" controls playsinline preload="metadata" poster="${v.sourceId?API+'/api/thumb/'+v.sourceId:esc(v.thumbUrl||"")}" src="${API}/api/videos/slug/${encodeURIComponent(v.slug)}/stream"></video>
      </div>
      <div class="p-ctl">
        <button class="pc-btn" id="pcNext" type="button" title="Next video (n)">Next ▸</button>
        <div class="pc-speed" id="pcSpeed">
          <button type="button" data-s="1" class="on">1×</button><button type="button" data-s="1.25">1.25×</button><button type="button" data-s="1.5">1.5×</button><button type="button" data-s="2">2×</button>
        </div>
        <a class="pc-btn" id="pcDl" href="#" download target="_blank" rel="noopener">Download</a>
        <label class="pc-auto"><input type="checkbox" id="pcAuto"/> Autoplay next</label>
        <div class="pc-keys">Shortcuts: space play · ←/→ seek 5s · f fullscreen · m mute · n next</div>
      </div>
      <h1 class="v-title">${esc(v.title||"Untitled")}</h1>
      ${(Array.isArray(v.artists)&&v.artists.length)?`<div class="v-by">${v.artists.map((n,i)=>`<a class="v-artist" href="index.html?artist=${encodeURIComponent((v.artistSlugs&&v.artistSlugs[i])||n)}">${esc(n)}</a>`).join("")}</div>`:""}
      <div class="v-meta">
        <span><svg viewBox="0 0 24 24"><path d="M2 12c2.5-5 6-7.5 10-7.5S19.5 7 22 12c-2.5 5-6 7.5-10 7.5S4.5 17 2 12Z"/><circle cx="12" cy="12" r="2.6"/></svg>${fmtNum(v.views)} views</span>
        ${v.duration?`<span><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${fmtDur(v.duration)}</span>`:""}
      </div>
      ${(Array.isArray(v.categories)&&v.categories.length)?`<div class="v-cats">${v.categories.map((c,i)=>`<a class="v-cat" href="index.html?category=${encodeURIComponent((v.categorySlugs&&v.categorySlugs[i])||c)}">${esc(c)}</a>`).join("")}</div>`:""}
      ${tags.length?`<div class="v-tags">${tags.slice(0,24).map(t=>`<span class="v-tag" onclick="location.href='index.html?tag=${encodeURIComponent(t)}'">${esc(t)}</span>`).join("")}</div>`:""}
      <div class="ad-slot" id="watchAdSlot"></div>
      <div class="sec">
        <div class="sec-head"><div class="sec-title">Related Videos</div></div>
        <div class="grid" id="moreGrid"></div>
      </div>
    `;

    // Playback is our OWN copy from R2 (our player, our ads). Count a view on
    // first play (fire and forget).
    const vid=document.getElementById("vid");
    vid.addEventListener("play",function(){
      fetch(`${API}/api/videos/slug/${encodeURIComponent(v.slug)}/view`,{method:"POST"}).catch(()=>{});
    },{once:true});

    // Arrived via an "Up next" auto-advance → start playback right away (best-effort;
    // autoplay-with-sound may be blocked, in which case the poster + play button stay).
    if(new URLSearchParams(location.search).get("autoplay")==="1"){ vid.play().catch(()=>{}); }

    // ── Player controls: speed, autoplay-next toggle, next, download ──
    document.querySelectorAll("#pcSpeed button").forEach(b=>b.addEventListener("click",()=>{
      vid.playbackRate=Number(b.dataset.s)||1;
      document.querySelectorAll("#pcSpeed button").forEach(x=>x.classList.toggle("on",x===b));
    }));
    const autoT=document.getElementById("pcAuto");
    autoT.checked=localStorage.getItem("vv_autonext")!=="0";
    autoT.addEventListener("change",()=>{ try{localStorage.setItem("vv_autonext",autoT.checked?"1":"0");}catch(e){} });
    document.getElementById("pcNext").addEventListener("click",()=>{ if(_nextVideo) location.href=upNextUrl(_nextVideo); });
    document.getElementById("pcDl").href=`${API}/api/videos/slug/${encodeURIComponent(v.slug)}/stream`;

    // ── Keyboard shortcuts (skip while typing) ──
    document.addEventListener("keydown",function(e){
      if(/^(INPUT|TEXTAREA|SELECT)$/.test((e.target&&e.target.tagName)||"")) return;
      // When the <video> itself has focus, native controls already handle these
      // keys — running ours too would double-seek / double-toggle.
      if(e.target&&e.target.tagName==="VIDEO") return;
      const vd=document.getElementById("vid"); if(!vd) return;
      if(e.key===" "||e.key==="k"){ e.preventDefault(); if(vd.paused)vd.play().catch(()=>{}); else vd.pause(); }
      else if(e.key==="ArrowRight"){ vd.currentTime=Math.min(vd.duration||1e9,vd.currentTime+5); }
      else if(e.key==="ArrowLeft"){ vd.currentTime=Math.max(0,vd.currentTime-5); }
      else if(e.key==="f"){ const sh=document.getElementById("playerShell"); try{ document.fullscreenElement?document.exitFullscreen():sh.requestFullscreen(); }catch(err){} }
      else if(e.key==="m"){ vd.muted=!vd.muted; }
      else if(e.key==="n"){ if(_nextVideo) location.href=upNextUrl(_nextVideo); }
    });

    // Playback goes through the /stream endpoint: hosted videos 302 to our R2 CDN
    // (instant), un-hosted ones stream progressively via proxy (plays in ~1-2s) and
    // cache to R2 in the background. No "preparing" wait needed.

    // Ad keywords for when zones go live
    var adKeywords=["hentai","rule34","video","porn","anime","adult","nsfw"];
    tags.slice(0,5).forEach(function(t){ adKeywords.push(t.toLowerCase()); });
    window.AD_KEYWORDS=adKeywords.join(",");

    // One ad slot above the related grid — disabled for launch
    if(window.ADS_ENABLED){
      window.onAdsReady(function(){
        var kw=window.AD_KEYWORDS;
        if(window.injectMultiformat) injectMultiformat("watchAdSlot","watch_mf",kw);
        else if(window.injectRecommendationWidget) injectRecommendationWidget("watchAdSlot","watch_native",kw);
      });
    }

    // Related videos (shared artist / category / tags) — powers the grid + the
    // autoplay "Up next" overlay. Backend backfills with popular so it's never empty.
    fetch(`${API}/api/videos/slug/${encodeURIComponent(v.slug)}/related?limit=12`).then(r=>r.json()).then(md=>{
      const list=(Array.isArray(md.videos)?md.videos:[]).filter(x=>x.slug!==v.slug).slice(0,12);
      const g=document.getElementById("moreGrid");
      if(!list.length){ g.parentElement.style.display="none"; return; }
      g.innerHTML=list.map(vcard).join("");
      _nextVideo=list[0];
      setupUpNext(vid,list[0]);
      // Preload the up-next thumbnail through the API proxy NOW — by the time the
      // video ends it's mirrored + browser-cached, so the overlay never shows blank.
      if(list[0]&&list[0].sourceId){ const pre=new Image(); pre.src=API+"/api/thumb/"+list[0].sourceId; }
    }).catch(()=>{});

  }catch{
    document.getElementById("content").innerHTML=`<div class="loading">
      <div style="font-size:28px;margin-bottom:12px">😕</div>
      <div style="font-weight:800;margin-bottom:6px">Video not found</div>
      <div style="font-size:13px;color:var(--muted)">It may have been removed or the URL is wrong.</div>
      <button class="btn-primary" style="margin-top:16px" onclick="location.href='index.html'">Browse Videos</button>
    </div>`;
  }
}
load();
</script>
