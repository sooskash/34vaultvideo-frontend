<style>
:root {
  --bg:#0a0b0e;
  --surface:#111318;
  --surface2:#181b22;
  --border:#1e222e;
  --border2:#262b3a;
  --text:#eef1f8;
  --sub:#8891a8;
  --red:#e11d48;
  --topH:60px;
  --filterH:52px;
  --maxW:1280px;
  --r:10px;
  /* Fallback if config.js hasn't set it (it computes --grad-accent from the accent + Settings toggle) */
  --accent-lt:#ffce54;
  --grad-accent:linear-gradient(135deg,#ffce54,var(--accent) 55%,var(--accent2));
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg)}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);min-height:100dvh;
  padding-top:calc(var(--topH) + var(--filterH));
  overscroll-behavior-y:none;
}
a{color:inherit;text-decoration:none}
img{display:block}
button{font-family:inherit}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ━━━ TOPBAR ━━━ */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:900;
  height:var(--topH);
  background:var(--bg);
  border-bottom:1px solid var(--border);
  transform:translateZ(0);
  will-change:transform;
}
.topbar-inner{
  height:100%;max-width:var(--maxW);margin:0 auto;
  display:flex;align-items:center;gap:14px;padding:0 20px;
}

/* Brand — "Vault" and "Video" both use the gradient-text treatment */
.brand{
  font-size:21px;font-weight:900;letter-spacing:-1px;
  cursor:pointer;user-select:none;flex-shrink:0;line-height:1;
}
.brand span{background:var(--grad-accent);-webkit-background-clip:text;background-clip:text;color:transparent}

/* Search */
.search-wrap{flex:1;position:relative;max-width:400px}
.search-icon{
  position:absolute;left:11px;top:50%;transform:translateY(-50%);
  color:var(--sub);font-size:14px;pointer-events:none;
}
.search-input{
  width:100%;height:40px;border-radius:999px;
  background:rgba(255,255,255,.045);border:1px solid var(--border2);
  color:var(--text);font-size:13px;padding:0 34px 0 36px;
  outline:none;transition:border-color .15s,background .15s,box-shadow .15s;
  -webkit-appearance:none;
}
@media(max-width:859px){
  /* Aurora mobile header: ONE row — logo · full-flex search · avatar. No burger. */
  :root{--topH:64px}
  .topbar-inner{gap:12px;padding:0 14px}
  .search-wrap{flex:1;max-width:none}
  /* Circular gradient avatar with amber ring (extra specificity beats the base rule below) */
  .topbar-inner .avatar-btn{
    width:36px;height:36px;border-radius:50%;
    box-shadow:0 0 0 2px var(--bg),0 0 0 3.5px var(--accent);
  }
  .topbar-inner .avatar-btn img{width:100%;height:100%;border-radius:50%!important}
  /* Prominent amber-lit search — full-strength amber border + soft glow ring */
  .search-input{
    font-size:16px;height:42px;border-radius:14px;
    background:var(--surface);border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-15,rgba(245,158,11,.15));
  }
  .search-input:focus{box-shadow:0 0 0 3px var(--accent-22,rgba(245,158,11,.22))}
  /* Chips row: FLEX-FIT — the controls SHARE the row width on ANY phone. Text pills
     grow/shrink together (segmented-bar style), the icon toggle stays fixed-size, so the
     row can never overflow or slide regardless of device width.
     .filter-inner prefix beats the base rules; background-color keeps the select chevrons. */
  .filter-strip .filter-inner{overflow:hidden;gap:6px;padding:0 10px}
  .filter-inner .filters-btn,.filter-inner .sort-select,.filter-inner .chip{
    height:33px;border-radius:999px;
    background-color:rgba(255,255,255,.05);border:1px solid var(--border2);
    color:var(--sub);font-size:11.5px;font-weight:700;
  }
  .filter-inner .filters-btn,.filter-inner .chip,.filter-inner .sort-select,.filter-inner .sel-ico{
    flex:1 1 0;min-width:0;max-width:150px;overflow:hidden;
  }
  .filter-inner .filters-btn{padding:0 8px;justify-content:center}
  .filter-inner .chip{flex-grow:1.2;padding:0 8px;justify-content:center}
  .filter-inner #sortSel{padding:0 20px 0 10px}
  .filter-inner .sel-ico .sort-select{width:100%;max-width:none}
  .filter-inner .gv-btn{flex:0 0 36px;width:36px;padding:0;justify-content:center}
  .filter-inner #chipFavs{margin-left:0}
}
/* Narrow phones: slightly smaller type/padding so labels stay readable as pills shrink */
@media(max-width:430px){
  .filter-strip .filter-inner{gap:5px;padding:0 8px}
  .filter-inner #sortSel{padding:0 16px 0 8px}
  .filter-inner .sel-ico .sort-select{padding:0 6px 0 24px}
  .filter-inner .sel-ico svg{left:8px}
  .filter-inner .gv-btn{flex-basis:33px;width:33px}
  .filter-inner .filters-btn,.filter-inner .sort-select,.filter-inner .chip{font-size:11px;height:32px}
}
.search-input:hover{background:rgba(255,255,255,.06)}
.search-input:focus{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px rgba(245,158,11,.14)}
.search-input::placeholder{color:var(--sub)}
.search-x{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  color:var(--sub);cursor:pointer;font-size:13px;
  background:none;border:none;padding:2px;line-height:1;
  display:none;border-radius:4px;transition:color .15s;
}

/* Nav pills — desktop */
.nav-pills{display:none;gap:4px;align-items:center;flex-shrink:0}

/* Profile avatar btn — points at the MAIN site's profile page */
.avatar-btn{

.avatar-btn img{width:34px;height:34px;object-fit:cover;border-radius:9px}

/* Account dropdown */
.acct{position:relative}
.acct-menu{position:absolute;top:calc(100% + 10px);right:0;min-width:210px;background:var(--panel,#111318);border:1px solid var(--border,#1e222e);border-radius:14px;padding:6px;box-shadow:0 16px 40px rgba(0,0,0,.55);display:none;z-index:1000}
.acct-menu.open{display:block}
.acct-head{display:flex;align-items:center;gap:10px;padding:9px 10px 11px;border-bottom:1px solid var(--border,#1e222e);margin-bottom:6px}
.acct-head .av{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#2a1500;overflow:hidden;background:linear-gradient(135deg,var(--accent,#ffce54),var(--accent2,#f59e0b))}
.acct-head .av img{width:100%;height:100%;object-fit:cover}
.acct-name{font-weight:800;font-size:13px;line-height:1.2}
.acct-sub{font-size:11px;color:var(--muted,#8891a8);margin-top:1px}
.acct-item{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:9px;font-size:13px;font-weight:700;color:var(--text,#eef1f8);cursor:pointer;text-decoration:none;transition:background .12s}
.acct-item:hover{background:var(--panel2,#181b22)}
.acct-item .mi{width:16px;text-align:center;opacity:.85}
.acct-item.danger{color:#fca5a5}

/* ━━━ FILTER STRIP ━━━ */
.filter-strip{
  position:fixed;top:var(--topH);left:0;right:0;z-index:799;
  height:var(--filterH);
  background:var(--bg);
  border-bottom:1px solid var(--border);
  box-shadow:0 8px 20px -12px rgba(0,0,0,.6);
  display:flex;align-items:center;
  overflow:hidden;
}
.filter-inner::-webkit-scrollbar{display:none}
.filter-inner{
  max-width:var(--maxW);width:100%;margin:0 auto;
  display:flex;align-items:center;gap:9px;
  padding:0 20px;
  flex-wrap:nowrap;
  overflow:hidden;
}
/* Push the Saved action to the far right so the view controls (Filters/Sort/Mode/Size)
   read as one group on the left and don't feel crammed against it. */
#chipFavs{margin-left:auto}

/* At 600px and below: tighten spacing but keep all labels visible */
@media(max-width:600px){
  .filter-inner{gap:6px;padding:0 12px}
  .filters-btn,.chip,.clear-filters-btn{height:28px;font-size:11px;padding:0 10px}
  .sort-select{height:28px;font-size:11px;padding:0 20px 0 8px}
}

/* At 420px and below: hard-cap the dropdowns so they can't blow out the row. */
@media(max-width:420px){
  .filter-inner{gap:5px;padding:0 10px}
  .sort-select{
    max-width:72px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  #sortSel{max-width:72px}
  #modeSel{max-width:68px}
  .filters-btn,.chip,.clear-filters-btn{height:26px;font-size:10.5px;padding:0 8px}
}

.filters-btn{
  height:30px;padding:0 13px;border-radius:999px;flex-shrink:0;
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--sub);font-size:12px;font-weight:700;
  cursor:pointer;user-select:none;white-space:nowrap;
  display:inline-flex;align-items:center;gap:6px;

}
.filters-btn:hover{border-color:var(--accent);color:var(--text)}

}

}

.chip .cn{

  background-repeat:no-repeat;background-position:right 9px center;

}
.sort-select:hover{border-color:var(--border2);color:var(--text);background:var(--surface)}
/* Icon'd dropdown (page mode): pages icon on the left, no chevron — still a native select */
.sel-ico{position:relative;display:inline-flex;flex-shrink:0;min-width:0}
.sel-ico svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--sub)}
.sel-ico .sort-select{padding:0 12px 0 30px;background-image:none;max-width:none}
.sort-select:focus{border-color:var(--accent);color:var(--text)}

}
.clear-filters-btn:hover{border-color:var(--red);color:var(--red)}

/* ━━━ FILTERS SHEET (simplified: search + tags + sort live in the strip) ━━━ */
.fsheet-back{
  position:fixed;inset:0;z-index:1000;

.fsheet{

}
.fsheet.open{display:flex}
@media(min-width:860px){
  .fsheet{

/* ━━━ MAIN ━━━ */
.main{max-width:var(--maxW);margin:0 auto;padding:20px 20px 60px}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}

@media(min-width:1100px){.grid{grid-template-columns:repeat(5,1fr);gap:16px}}
@media(min-width:1300px){.grid{grid-template-columns:repeat(6,1fr)}}
/* "videos per row" toggle. Default = dense responsive grid. .g1 = big,
   fewer-per-row layout: 1 on mobile → 3 on desktop. */
.grid.g1{grid-template-columns:1fr}
@media(min-width:600px){.grid.g1{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1100px){.grid.g1{grid-template-columns:repeat(3,1fr)}}
.grid.g1 .ad-row{grid-column:1/-1}
/* Video-size toggle button (icon reflects current mode) */

/* ━━━ CARD ━━━ */
.card{
  border-radius:14px;background:var(--surface);
  border:1px solid var(--border);overflow:hidden;
  position:relative;display:flex;flex-direction:column;
  transition:transform .2s,border-color .2s,box-shadow .2s;
  cursor:pointer;min-width:0;max-width:100%;
}
.card:hover{
  transform:translateY(-5px);
  border-color:var(--accent-45,rgba(245,158,11,.5));
  box-shadow:0 16px 40px rgba(0,0,0,.55),0 0 0 1px var(--accent-10,rgba(245,158,11,.12));
}
.card:active{transform:translateY(-2px)}

.c-cover{
  position:relative;overflow:hidden;
  aspect-ratio:16/9;background:#0d1018;flex-shrink:0;
}
.c-cover::after{
  content:"";position:absolute;left:0;right:0;bottom:0;height:38%;
  background:linear-gradient(180deg,transparent,rgba(6,7,11,.72));
  pointer-events:none;z-index:1;
}
.c-img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .4s cubic-bezier(.4,0,.2,1);
}
.card:hover .c-img{transform:scale(1.07)}

  padding:9px 9px 0;
  font-size:11px;font-weight:800;color:var(--text);line-height:1.3;
  letter-spacing:.1px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;
  height:calc(9px + 2*11px*1.3);
}

/* Bookmark btn */
.c-bk{
  position:absolute;top:8px;right:8px;z-index:3;
  width:28px;height:28px;border-radius:10px;
  background:rgba(10,11,14,.7);border:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:13px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  transition:all .15s;
}
.c-bk:hover{border-color:var(--accent)}
.c-bk.on{border-color:var(--accent);background:var(--accent-15,rgba(245,158,11,.18));color:var(--accent)}

.c-new{
  position:absolute;top:8px;left:8px;z-index:3;
  height:20px;padding:0 8px;border-radius:7px;
  font-size:9px;font-weight:900;letter-spacing:.4px;
  display:flex;align-items:center;
  box-shadow:0 2px 8px rgba(0,0,0,.4);
}
.c-new.badge-new{background:var(--grad-accent);color:#2a1500}
.c-new.badge-hot{background:linear-gradient(120deg,#ff6b8b,#ff2d55);color:#fff}

/* Duration chip on the cover (Aurora — was the page-count chip on the comic site) */
.c-dur{
  position:absolute;bottom:8px;right:8px;z-index:2;
  height:20px;padding:0 8px;border-radius:7px;
  background:rgba(10,11,14,.72);border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  color:#dfe3ee;font-size:9.5px;font-weight:800;
  display:flex;align-items:center;gap:4px;
}
.c-dur svg{width:10px;height:10px;fill:currentColor;stroke:none;opacity:.85}

/* HD quality badge (rule34video DNA) — bottom-left, amber-tinted */
.c-hd{
  position:absolute;bottom:8px;left:8px;z-index:2;
  height:20px;padding:0 7px;border-radius:6px;
  background:rgba(245,158,11,.92);color:#2a1500;
  font-size:9px;font-weight:900;letter-spacing:.5px;
  display:flex;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.35);
}
/* Center play button — appears on hover (tube-site signature) */
.c-play{
  position:absolute;inset:0;z-index:2;display:grid;place-items:center;
  opacity:0;transition:opacity .2s;pointer-events:none;
}
.card:hover .c-play{opacity:1}
.c-play span{
  width:46px;height:46px;border-radius:50%;
  background:rgba(245,158,11,.92);display:grid;place-items:center;
  box-shadow:0 6px 20px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.4);
  transform:scale(.8);transition:transform .2s;
}
.card:hover .c-play span{transform:scale(1)}
.c-play svg{width:20px;height:20px;fill:#2a1500;margin-left:2px}

/* Card footer */
.c-foot{
  padding:6px 9px 9px;
  display:flex;align-items:center;justify-content:space-between;gap:6px;
  min-height:30px;
}
.c-views{
  display:inline-flex;align-items:center;gap:4px;flex-shrink:0;
  font-size:10px;font-weight:800;color:var(--text);
}
.c-views .c-ico{opacity:.6}
.c-ico{
  width:11px;height:11px;flex-shrink:0;
  fill:none;stroke:currentColor;stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round;
  opacity:.8;transition:stroke .2s,opacity .2s;
}
.card:hover .c-ico{opacity:1;stroke:var(--accent)}
.c-tag1{
  font-size:10px;font-weight:700;
  background:var(--grad-accent);-webkit-background-clip:text;background-clip:text;color:transparent;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;
}
.c-tag1.c-by{font-weight:800}
.c-tag1.c-by::before{content:"@";opacity:.7}

/* ━━━ TOP ARTISTS RAIL ━━━ */
.artists-rail{margin:2px 0 20px}
.rail-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.rail-title{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:900;letter-spacing:-.2px}
.rail-title svg{width:17px;height:17px;fill:none;stroke:var(--accent);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.rail-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.rail-scroll::-webkit-scrollbar{display:none}
.artist-tile{
  flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:7px;
  width:78px;text-decoration:none;cursor:pointer;
}
.artist-av{
  width:64px;height:64px;border-radius:50%;
  display:grid;place-items:center;
  font-size:24px;font-weight:900;color:#2a1500;
  background:var(--grad-accent,linear-gradient(135deg,#ffce54,var(--accent) 55%,#c07c08));
  box-shadow:0 0 0 2px var(--bg),0 0 0 3.5px var(--accent-40,rgba(245,158,11,.4)),0 8px 18px -8px rgba(245,158,11,.5);
  transition:transform .15s,box-shadow .15s;
}
.artist-tile:hover .artist-av{transform:translateY(-2px);box-shadow:0 0 0 2px var(--bg),0 0 0 3.5px var(--accent),0 12px 22px -8px rgba(245,158,11,.7)}
.artist-name{
  font-size:11px;font-weight:800;text-align:center;line-height:1.2;max-width:100%;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  background:var(--grad-accent);-webkit-background-clip:text;background-clip:text;color:transparent;
}
.artist-count{font-size:10px;font-weight:700;color:var(--sub,#8891a8)}

/* ━━━ SORT TABS (rule34video-style) ━━━ */
.sort-tabs{display:flex;gap:6px;flex-wrap:wrap}
.sort-tab{
  height:32px;padding:0 15px;border-radius:999px;
  background:rgba(255,255,255,.04);border:1px solid var(--border,#1e222e);
  color:var(--sub,#8891a8);font-size:12.5px;font-weight:800;cursor:pointer;
  transition:all .15s;
}
.sort-tab:hover{border-color:#3a4055;color:var(--text)}
.sort-tab.on{
  background:var(--grad-accent,linear-gradient(135deg,#ffce54,var(--accent) 55%,#c07c08));
  border:none;color:#2a1500;
  box-shadow:0 6px 16px -8px var(--accent-45,rgba(245,158,11,.6));
}
/* Sort tabs replace the old Sort dropdown; the Pages/Scroll dropdown is a comic-site
   leftover (irrelevant to video). Both hidden — kept in DOM only so their JS is inert. */
#sortSel,.filter-inner .sel-ico{display:none!important}

/* ━━━ CATEGORIES BAR ━━━ */
.cats-bar{margin:0 0 16px}
.cats-bar .rail-title{margin-bottom:9px}
.cats-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:5px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.cats-scroll::-webkit-scrollbar{display:none}
.cat-chip{
  flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 14px;border-radius:999px;
  background:var(--surface,#111318);border:1px solid var(--border2,#262b3a);
  color:var(--text);font-size:12px;font-weight:800;text-decoration:none;white-space:nowrap;
  transition:all .15s;
}
.cat-chip:hover{border-color:var(--accent);transform:translateY(-1px)}
.cat-chip .cc-n{font-size:10px;font-weight:700;color:var(--sub,#8891a8)}

/* ━━━ SKELETON ━━━ */
.sk{border-radius:var(--r);background:var(--surface);border:1px solid var(--border);overflow:hidden}
.sk-c{
  aspect-ratio:16/9;
  background:linear-gradient(110deg,var(--surface) 30%,var(--surface2) 50%,var(--surface) 70%);
  background-size:200% 100%;animation:sh 1.5s ease infinite;
}
.sk-b{padding:8px}
.sk-l{
  height:8px;border-radius:4px;margin-bottom:6px;
  background:linear-gradient(110deg,var(--surface2) 30%,var(--border2) 50%,var(--surface2) 70%);
  background-size:200% 100%;animation:sh 1.5s ease infinite;
}
.sk-l.s{width:55%}
@keyframes sh{to{background-position:-200% 0}}

/* ━━━ STATES ━━━ */
.state-box{
  grid-column:1/-1;padding:60px 20px;text-align:center;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
}
.state-ico{font-size:38px;margin-bottom:14px}
.state-t{font-size:17px;font-weight:800;margin-bottom:6px}
.state-s{font-size:13px;color:var(--sub);margin-bottom:20px}
.state-btn{
  height:38px;padding:0 20px;border-radius:9px;
  background:var(--accent);color:#000;font-size:13px;font-weight:800;
  border:none;cursor:pointer;transition:background .15s;
}
.state-btn:hover{background:var(--accent2)}

/* ━━━ IN-FEED AD CARD (blended, hdporncomics-style) ━━━
   Ads blend INTO the video grid as cards: same surface, border, radius and shadow as a
   video card, spanning 2 grid cells so the native/banner has room (on the 2-col mobile
   grid that's full width). A small "Sponsored" label keeps it honest.
   NOTE: slots only get created when window.ADS_ENABLED is true (off for launch). */
.ad-row{
  grid-column:span 2;
  border-radius:var(--r);
  background:var(--surface);
  border:1px solid var(--border);
  box-shadow:0 8px 24px rgba(0,0,0,.35);
  position:relative;overflow:hidden;
  min-height:120px;
  padding:22px 8px 8px;
  display:flex;align-items:center;justify-content:center;
}
.ad-row::before{
  content:"Sponsored";
  position:absolute;top:7px;left:10px;z-index:2;
  font-size:9px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;
  color:var(--sub);opacity:.6;pointer-events:none;
}
/* Hide only truly-empty rows (pre-injection). :empty still matches despite ::before
   (generated content isn't a child node), so unfilled slots collapse instead of showing
   an empty Sponsored card. */
.ad-row:empty{display:none}

/* ━━━ PAGINATION ━━━ */
.pag{
  grid-column:1/-1;display:flex;align-items:center;
  justify-content:center;gap:5px;padding:28px 0 8px;flex-wrap:wrap;
}
.pg{
  min-width:34px;height:34px;padding:0 8px;border-radius:8px;
  border:1px solid var(--border2);background:var(--surface2);color:var(--sub);
  font-size:12px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;user-select:none;
}
.pg:hover{border-color:var(--accent);color:var(--text)}
.pg.on{background:var(--accent);border-color:var(--accent);color:#000;font-weight:800}
.pg:disabled{opacity:.25;cursor:default;pointer-events:none}
.pg-dots{width:28px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--sub);font-size:13px}
.pag-goto{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px}
.pag-goto input{
  width:90px;height:34px;border-radius:8px;text-align:center;
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--text);font-size:16px;outline:none;-webkit-appearance:none;
}
.pag-goto input:focus{border-color:var(--accent)}
.pag-goto button{
  height:34px;padding:0 16px;border-radius:8px;
  background:var(--accent);color:#000;border:none;
  font-size:12px;font-weight:800;cursor:pointer;transition:background .15s;
}
.pag-goto button:hover{background:var(--accent2)}
.scroll-sentinel{height:1px}

/* Footer links */
.foot-links{
  max-width:var(--maxW);margin:0 auto;padding:0 20px 40px;
  display:flex;gap:16px;justify-content:center;
  font-size:11px;color:var(--sub);font-weight:600;
}
.foot-links a:hover{color:var(--text)}
/* ══════════ CLEAN REDESIGN — match the UI concept ══════════ */
/* wider, centered search */
.search-wrap{flex:1;max-width:560px;margin:0 auto}
@media(max-width:760px){.search-wrap{max-width:none;margin:0}}
/* ONE clean control row (replaces the old 3 stacked bars) */
.ctl{display:flex;align-items:center;gap:11px;margin:2px 0 4px;flex-wrap:wrap}
/* sort tabs → segmented control */
.sort-tabs{display:inline-flex;gap:3px;background:var(--surface,#12141a);border:1px solid var(--border,#242835);border-radius:12px;padding:4px}
.sort-tab{height:auto;padding:8px 15px;border-radius:9px;border:none;background:none;font-size:13px;font-weight:700;color:var(--sub,#8b93a7);cursor:pointer;transition:color .12s,background .12s}
.sort-tab:hover{color:var(--text);background:transparent}
.sort-tab.on{background:var(--surface2,#1e222c);color:var(--text);box-shadow:inset 0 0 0 1px rgba(255,255,255,.06)}
.sort-tab.on::before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:7px;vertical-align:middle}
/* filters button */
.fbtn{display:inline-flex;align-items:center;gap:7px;height:40px;padding:0 15px;border-radius:11px;background:var(--surface,#12141a);border:1px solid var(--border,#242835);font-size:13px;font-weight:700;color:var(--sub,#8b93a7);cursor:pointer;transition:all .12s}
.fbtn:hover{border-color:var(--accent);color:var(--text)}
.fbtn.on{border-color:var(--accent);color:var(--accent)}
.fbtn .filters-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:var(--accent);color:#221200;font-size:11px;font-weight:900}
/* grid-size toggle */
.gv-btn2{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:11px;background:var(--surface,#12141a);border:1px solid var(--border,#242835);color:var(--sub,#8b93a7);cursor:pointer;flex-shrink:0}
.gv-btn2 svg{width:18px;height:18px}
.gv-btn2:hover{color:var(--text);border-color:var(--accent)}
/* video count, right-aligned */
.count{margin-left:auto;font-size:13px;color:var(--sub,#8b93a7);font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap}
.count b{color:var(--text);font-weight:800}
/* category chips — clean pills, no label */
.cats{display:flex;gap:8px;overflow-x:auto;margin:14px 0 20px;padding-bottom:2px;scrollbar-width:none;-webkit-mask-image:linear-gradient(90deg,#000 93%,transparent);mask-image:linear-gradient(90deg,#000 93%,transparent)}
.cats::-webkit-scrollbar{display:none}
.cat-chip{flex-shrink:0;display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:999px;background:var(--surface,#12141a);border:1px solid var(--border,#242835);font-size:12.5px;font-weight:700;color:var(--sub,#8b93a7);white-space:nowrap;text-decoration:none;transition:border-color .12s,color .12s}
.cat-chip:hover{border-color:var(--accent);color:var(--text);transform:none}
.cat-chip .cc-n{font-size:11px;font-weight:700;color:var(--dim,#5b6373);font-variant-numeric:tabular-nums}
.cat-chip.on{background:rgba(245,166,35,.12);border-color:rgba(245,166,35,.42);color:var(--accent)}
.cat-chip.on .cc-n{color:var(--accent);opacity:.85}
/* a touch more room between cards */
.grid{gap:16px 14px}
</style>
</head>

<script>
window.ADS_ENABLED = false; // TODO: enable after the new ExoClick account zones for 34vaultvideo.com are created (see the ads.js comment block at the bottom of this file).

const API   = window.__API__ || "";
const K_FAV = "favoriteSlugs";
const K_FIL = "videoIndexFilters_v1";
const K_PMODE = "videoIndexPageMode_v1";
const PAGE  = 24;
const AD_N  = 6;

let all=[], favOnly=false, page=1;
let _adSeq=0;   // global unique-id counter for in-grid ad slots
let pageMode="pages", loadedCount=PAGE;
let activeTags=new Set(), sortMode="new";
let activeArtist=null, activeArtistName="";
let activeCategory=null, activeCategoryName="";
// Server-side paging: the catalog is 150k+, so we NEVER load it all client-side.

let total=0, offset=0, loading=false, done=false, _qToken=0;

const grid       = document.getElementById("grid");
// Videos-per-row toggle (persisted), DEFAULT = "2" (dense grid: 2 per row on mobile).

// ── SCROLL LOCK (iOS-safe) ──
let _scrollLockY=0, _lockCount=0;
function lockScroll(){
  if(_lockCount===0){
    _scrollLockY=window.scrollY||window.pageYOffset||0;
    document.body.style.position="fixed";
    document.body.style.top=`-${_scrollLockY}px`;
    document.body.style.left="0";document.body.style.right="0";document.body.style.width="100%";
  }
  _lockCount++;
}
function unlockScroll(){
  _lockCount=Math.max(0,_lockCount-1);
  if(_lockCount===0){
    document.body.style.position="";document.body.style.top="";
    document.body.style.left="";document.body.style.right="";document.body.style.width="";
    window.scrollTo(0,_scrollLockY);
  }
}

// Build the /api/videos query for the current filter+sort state.
function buildVideosUrl(off){
  const p=new URLSearchParams();
  p.set("all","1"); p.set("limit",String(PAGE)); p.set("offset",String(off)); p.set("sort",sortMode);
  const q=srch.value.trim(); if(q) p.set("q",q);
  if(activeCategory) p.set("category",activeCategory);
  if(activeArtist) p.set("artist",activeArtist);
  if(activeTags.size) p.set("tags",[...activeTags].join(","));
  return `${API}/api/videos?${p.toString()}`;
}

function showLoadError(){
  grid.innerHTML=`<div class="state-box"><div class="state-ico">⚠️</div><div class="state-t">Couldn't load</div><div class="state-s">Check connection and try again.</div><button class="state-btn" onclick="location.reload()">Retry</button></div>`;
}

// Reset paging and load the first page (or the current page, in pages-mode).
async function runQuery(reset){
  const token=++_qToken;
  if(reset){
    all=[]; offset=0; done=false;
    // NOTE: do NOT reset `page` here — pagination sets it before calling. apply()
    // (filter/sort/search) resets page to 1 itself.
    grid.innerHTML='<div style="text-align:center;padding:40px;color:var(--sub)"><div class="spinner" style="margin:0 auto 12px"></div>Loading videos…</div>';
    pagArea.innerHTML=""; scrollSentinel.style.display="none";
  }
  // "Saved" = client-side favorites → fetch by slug, sort + show client-side.
  if(favOnly){
    const favs=[...getFavs()];
    if(!favs.length){ all=[]; total=0; done=true; if(token===_qToken){ render(); gridCount.textContent="0 videos"; } return; }
    try{
      const r=await fetch(`${API}/api/videos/by-slugs?slugs=${encodeURIComponent(favs.join(","))}`);
      const d=await r.json(); let vids=Array.isArray(d.videos)?d.videos:[];
      if(token!==_qToken) return;
      all=sortClient(vids); total=all.length; done=true;
      calcAvgViewsPerDay(); buildFilters(); render(); gridCount.textContent=`${total} videos`;
    }catch{ if(token===_qToken && !all.length) showLoadError(); }
    return;
  }
  fetchInto(pageMode==="pages" ? (page-1)*PAGE : 0, "replace", token);
}

// Fetch one page from the server. mode "replace" swaps `all` (reset / pages-mode);
// "append" adds to it (scroll-mode load-more).
async function fetchInto(off, mode, token){
  if(mode==="append" && loading) return; // only scroll-appends need dedup; replace/paginate always fire
  loading=true;
  try{
    const r=await fetch(buildVideosUrl(off));
    if(!r.ok) throw 0;
    const d=await r.json();
    if(token!==_qToken) return; // superseded by a newer query
    const vids=Array.isArray(d.videos)?d.videos:[];
    total=Number(d.total||0);
    offset=off+vids.length;
    done = offset>=total || !vids.length;
    if(mode==="append"){
      all=all.concat(vids);
      calcAvgViewsPerDay(); buildFilters();
      appendCards(vids,getFavs());
      scrollSentinel.style.display=done?"none":"block";
    } else {
      all=vids;
      resolveNames(); calcAvgViewsPerDay(); buildFilters();
      render();
    }
    gridCount.innerHTML = total?`<b>${total.toLocaleString()}</b> videos`:"";
  }catch{ if(!all.length) showLoadError(); }
  finally{ loading=false; }
}

function loadMore(){
  if(loading||done||favOnly||pageMode!=="scroll") return;
  fetchInto(offset,"append",_qToken);
}

// Pull the pretty artist/category display name off the first loaded row.
function resolveNames(){
  if(activeArtist&&!activeArtistName){ const h=all.find(v=>Array.isArray(v.artistSlugs)&&v.artistSlugs.includes(activeArtist)); if(h){ activeArtistName=h.artists[h.artistSlugs.indexOf(activeArtist)]||activeArtist; } }
  if(activeCategory&&!activeCategoryName){ const h=all.find(v=>Array.isArray(v.categorySlugs)&&v.categorySlugs.includes(activeCategory)); if(h){ activeCategoryName=h.categories[h.categorySlugs.indexOf(activeCategory)]||activeCategory; } }
  if(activeArtistName||activeCategoryName) updateHeaderLabels();
}

function sortClient(vids){
  if(sortMode==="views") return vids.sort((a,b)=>Number(b.views||0)-Number(a.views||0));
  if(sortMode==="longest") return vids.sort((a,b)=>Number(b.duration||0)-Number(a.duration||0));
  return vids.sort((a,b)=>Number(b.id||0)-Number(a.id||0));
}

// The filter sheet's tag list comes from the SERVER (whole catalog), not the loaded

async function loadTags(){

    const d=await fetch(`${API}/api/videos/tags`).then(r=>r.json());

function appendCards(slice,favs){
  slice.forEach((v,i)=>{
    // In-grid ad slots — DISABLED for launch. Same rotation structure as the main site
    // (r%4: native / outstream / multiformat / TS-video); flips on with window.ADS_ENABLED.
    if(window.ADS_ENABLED && i>0 && i%AD_N===0){
      const adId="gridAd_"+(_adSeq++);   // unique id per slot
      const slot=grid.querySelectorAll(".ad-row").length;  // rotation position = slots already in the grid
      const adDiv=document.createElement("div");
      adDiv.className="ad-row";
      adDiv.id=adId;
      grid.appendChild(adDiv);
      (function(id,r){
        window.onAdsReady(function(){
          var kw=window.AD_KEYWORDS||"hentai,rule34,video,porn,anime,adult,nsfw";
          if(r%4===0 && window.injectRecommendationWidget)  injectRecommendationWidget(id,"grid_native",kw);
          else if(r%4===1 && window.injectOutstreamVideo)   injectOutstreamVideo(id,"grid_out",kw);
          else if(r%4===2 && window.injectMultiformat)      injectMultiformat(id,"grid_mf",kw);
          else if(window.injectTSVideo)                     injectTSVideo(id,"grid_tsvideo");
          setTimeout(function(){
            var e=document.getElementById(id); if(!e) return;
            var filled=e.querySelector("iframe,video,img") || e.getBoundingClientRect().height>90;
            if(!filled) e.style.display="none";
          },6000);
        });
      })(adId, slot);
    }
    grid.appendChild(mkCard(v,favs));
  });
}

function setPageMode(mode){
  if(mode===pageMode) return;
  if(pageMode==="scroll" && mode==="pages"){
    // Calculate approximate page from scroll position
    const cards = grid.querySelectorAll('.card');
    if(cards.length){
      const scrollY = window.scrollY || window.pageYOffset;
      let visibleIndex = 0;
      for(let i=0;i<cards.length;i++){
        if(cards[i].offsetTop < scrollY + 200) visibleIndex = i;
      }
      page = Math.floor(visibleIndex / PAGE) + 1;
    }
  }
  pageMode=mode;
  try{ localStorage.setItem(K_PMODE,pageMode); }catch{}
  modeSel.value=pageMode; render();
}
modeSel.addEventListener("change",()=>setPageMode(modeSel.value));

function buildPag(cur,tot){
  let h=`<button class="pg" data-p="${cur-1}" ${cur===1?"disabled":""}>‹</button>`;
  const ps=[];
  if(tot<=7){ for(let i=1;i<=tot;i++) ps.push(i); }
  else{
    ps.push(1);
    if(cur>3) ps.push("…");
    for(let i=Math.max(2,cur-1);i<=Math.min(tot-1,cur+1);i++) ps.push(i);
    if(cur<tot-2) ps.push("…");
    ps.push(tot);
  }
  for(const p of ps){
    h+=p==="…"?`<span class="pg-dots">…</span>`:`<button class="pg${p===cur?" on":""}" data-p="${p}">${p}</button>`;
  }
  return h+`<button class="pg" data-p="${cur+1}" ${cur===tot?"disabled":""}>›</button>`;
}

let _avgViewsPerDay=10;
function calcAvgViewsPerDay(){
  if(!all.length) return;
  const now=Date.now(), DAY=86400000;
  let total=0, count=0;
  for(const v of all){
    const age=Math.max(1,(now-(v.createdAt?new Date(v.createdAt).getTime():now))/DAY);
    const vpd=Number(v.views||0)/age;
    if(vpd>0){total+=vpd;count++;}
  }
  _avgViewsPerDay=count?total/count:10;
}

function getBadge(v){
  const now=Date.now();
  const createdMs=v.createdAt?new Date(v.createdAt).getTime():0;
  const DAY=86400000;
  const daysSince=createdMs?Math.max(0.04,(now-createdMs)/DAY):null;
  const viewsPerDay=daysSince?Number(v.views||0)/daysSince:0;
  if(viewsPerDay>_avgViewsPerDay*3) return{text:"HOT",cls:"badge-hot"};
  if(createdMs&&(now-createdMs)<2*DAY) return{text:"NEW",cls:"badge-new"};
  return null;
}

function mkCard(v,favs){
  const slug=v.slug||"",title=v.title||"Untitled",
        // Serve thumbs through our CDN proxy (source hotlinks are ddos-guard-blocked
        // on many networks). Falls back to the raw url if there's no sourceId.
        thumb=v.sourceId?`${API}/api/thumb/${v.sourceId}`:(v.thumbUrl||""),
        isFav=favs.has(slug);
  const tags=normTags(v.tags);
  const badge=getBadge(v);
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`
    <a href="watch.html?slug=${encodeURIComponent(slug)}" style="display:contents">
      <div class="c-cover">
        ${badge?`<div class="c-new ${badge.cls}">${badge.text}</div>`:""}
        <img class="c-img" src="${esc(thumb)}" alt="${esc(title)}" loading="lazy" decoding="async" referrerpolicy="no-referrer"
          onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22320%22 height=%22180%22%3E%3Crect fill=%22%230d1018%22 width=%22320%22 height=%22180%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%231a1e2a%22 font-size=%2214%22 font-family=%22sans-serif%22%3ENo Thumb%3C/text%3E%3C/svg%3E'" />
        ${v.duration?`<div class="c-dur"><svg viewBox="0 0 24 24"><polygon points="7 4 20 12 7 20 7 4"/></svg>${fmtDur(v.duration)}</div>`:""}
        <div class="c-hd">HD</div>
        <div class="c-play"><span><svg viewBox="0 0 24 24"><polygon points="7 4 20 12 7 20 7 4"/></svg></span></div>
      </div>
      <div class="c-title">${esc(title)}</div>
    </a>
    <div class="c-bk${isFav?" on":""}" data-slug="${esc(slug)}">${isFav?"&#9733;":"&#9734;"}</div>
    <div class="c-foot">
      <div class="c-tag1${(Array.isArray(v.artists)&&v.artists.length)?" c-by":""}">${(Array.isArray(v.artists)&&v.artists.length)?esc(v.artists[0]):(tags.length?esc(tags[0]):"")}</div>
      <span class="c-views">
        <svg class="c-ico" viewBox="0 0 24 24">
          <path d="M2 12c2.5-5 6-7.5 10-7.5S19.5 7 22 12c-2.5 5-6 7.5-10 7.5S4.5 17 2 12Z"/>
          <circle cx="12" cy="12" r="2.6"/>
        </svg>${fmtNum(v.views)}
      </span>
    </div>
  `;
  card.querySelector(".c-bk").addEventListener("click",e=>{
    e.preventDefault(); e.stopPropagation();
    const s=getFavs(),sl=e.currentTarget.dataset.slug;
    const adding=!s.has(sl);
    adding?s.add(sl):s.delete(sl);
    setFavs(s);
    e.currentTarget.classList.toggle("on",adding);
    e.currentTarget.innerHTML=adding?"&#9733;":"&#9734;";
    if(favOnly) apply();
  });

  // Hover-to-preview (rule34video DNA): scrub through the source's frame screenshots.
  // Thumb is .../320x180/{N}.jpg — cycle N on hover, restore on leave. Desktop/hover only.
  const base=frameBase(thumb);
  if(base && window.matchMedia("(hover:hover)").matches){
    const img=card.querySelector(".c-img");
    let iv=null,i=1;
    const stop=()=>{ if(iv){clearInterval(iv);iv=null;} img.src=thumb; };
    card.addEventListener("mouseenter",()=>{
      if(iv)return; i=1;
      iv=setInterval(()=>{ i=i%9+1; const p=new Image(); p.onload=()=>{ if(iv) img.src=p.src; }; p.src=base+i+".jpg"; },650);
    });
    card.addEventListener("mouseleave",stop);
  }
  return card;
}
// Derive the frame-screenshot base from a thumb URL (.../320x180/3.jpg -> .../320x180/)
function frameBase(u){ const m=String(u||"").match(/^(.*\/)\d+\.jpg(\?.*)?$/i); return m?m[1]:null; }

let _hasArtists=false;
async function loadTopArtists(){
  try{
    const r=await fetch(`${API}/api/videos/artists`);
    if(!r.ok) return;
    const d=await r.json();
    const list=(d.artists||[]).slice(0,20);
    if(!list.length) return;
    document.getElementById("artistsRow").innerHTML=list.map(a=>`<a class="artist-tile" href="index.html?artist=${encodeURIComponent(a.slug)}" title="${esc(a.name||a.slug)}">
      <div class="artist-av">${esc(String(a.name||a.slug).charAt(0).toUpperCase())}</div>
      <div class="artist-name">${esc(a.name||a.slug)}</div>
      <div class="artist-count">${a.count} vid${a.count===1?"":"s"}</div>
    </a>`).join("");
    _hasArtists=true;
    updateRailVisibility();
  }catch{}
}
let _hasCats=false;
function updateRailVisibility(){
  const isDefault=!activeArtist && !activeCategory && !activeTags.size && !favOnly && !srch.value.trim();
  const rail=document.getElementById("artistsRail"); if(rail) rail.style.display=(_hasArtists && isDefault)?"":"none";
  const cb=document.getElementById("catsBar"); if(cb) cb.style.display=(_hasCats && isDefault)?"":"none";
}
// Categories bar = the top series/parody categories (Genshin Impact, 3D, …) as chips.
function loadCategories(){
  fetch(`${API}/api/videos/categories`).then(r=>r.json()).then(d=>{
    const top=(d.categories||[]).slice(0,24);
    if(!top.length) return;
    document.getElementById("catsRow").innerHTML=top.map(c=>
      `<a class="cat-chip" href="index.html?category=${encodeURIComponent(c.slug)}">${esc(c.name)}<span class="cc-n">${c.count}</span></a>`).join("");
    _hasCats=true;
    updateRailVisibility();
  }).catch(()=>{});
}

function clearAll(){
  srch.value=""; activeTags=new Set(); activeArtist=null; activeArtistName=""; activeCategory=null; activeCategoryName="";
  favOnly=false; sortMode="new"; filterSearchInput.value="";
  srchX.classList.remove("vis"); chipFavs.classList.remove("on");
  sortSel.value=sortMode;
  renderFilterChips(); renderSelectedChips(); apply();
}
window.clearAll=clearAll;

function save(){
  try{
    localStorage.setItem(K_FIL,JSON.stringify({
      q:srch.value,tags:[...activeTags],fav:favOnly,sort:sortMode,
    }));
  }catch{}
}
function restore(){
  try{
    const s=JSON.parse(localStorage.getItem(K_FIL)||"{}");
    if(s.q){ srch.value=s.q; srchX.classList.add("vis"); }
    if(Array.isArray(s.tags)) activeTags=new Set(s.tags);
    if(s.fav) favOnly=true;
    if(s.sort==="new"||s.sort==="views"||s.sort==="longest") sortMode=s.sort;
    chipFavs.classList.toggle("on",favOnly);
    sortSel.value=sortMode;
  }catch{}
}
// Keep the visible sort tabs (Latest / Most Viewed / Longest) in sync with sortMode.
function syncSortTabs(){ document.querySelectorAll(".sort-tab").forEach(t=>t.classList.toggle("on",t.dataset.sort===sortMode)); }
// URL params (?tag=… from watch-page tag chips, ?q=… from the SearchAction schema)
// override whatever was restored from localStorage.
function applyUrlParams(){
  try{
    const p=new URLSearchParams(location.search);
    const t=p.get("tag"), uq=p.get("q"), ar=p.get("artist"), cat=p.get("category");
    if(p.get("saved")==="1"){ favOnly=true; chipFavs.classList.add("on"); }  // Saved link from other pages
    if(cat){
      activeCategory=cat.toLowerCase(); favOnly=false; activeTags=new Set(); activeArtist=null;
      chipFavs.classList.remove("on");
      srch.value=""; srchX.classList.remove("vis");
    }
    if(ar){
      activeArtist=ar.toLowerCase(); favOnly=false; activeTags=new Set();
      chipFavs.classList.remove("on");
      srch.value=""; srchX.classList.remove("vis");
    }
    if(t){
      activeTags=new Set([t]); favOnly=false;
      chipFavs.classList.remove("on");
      if(!uq){ srch.value=""; srchX.classList.remove("vis"); }
    }
    if(uq){ srch.value=uq; srchX.classList.add("vis"); }
    sortSel.value=sortMode;
  }catch{}
}

// Debounce search so typing doesn't re-filter the whole catalog on every keystroke
function debounce(fn,ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; }
const applyDebounced=debounce(apply,250);

srch.addEventListener("input",()=>{ srchX.classList.toggle("vis",!!srch.value); applyDebounced(); });
srchX.addEventListener("click",()=>{ srch.value=""; srchX.classList.remove("vis"); srch.focus(); apply(); });
chipFavs.addEventListener("click",()=>{ favOnly=!favOnly; chipFavs.classList.toggle("on",favOnly); apply(); });

function openFsheet(){ fsheetBack.classList.add("open"); fsheet.classList.add("open"); lockScroll(); }
function closeFsheet(){ fsheetBack.classList.remove("open"); fsheet.classList.remove("open"); unlockScroll(); }
filtersBtn.addEventListener("click",openFsheet);
fsheetBack.addEventListener("click",closeFsheet);
fsheetX.addEventListener("click",closeFsheet);
fsheetDone.addEventListener("click",closeFsheet);
fsheetClear.addEventListener("click",clearAll);
filterSearchInput.addEventListener("input",renderFilterChips);

sortSel.addEventListener("change",()=>{ sortMode=sortSel.value; page=1; loadedCount=PAGE; _scrollLoading=false; window.scrollTo(0,0); apply(); });

function normTags(t){ if(!t)return[]; if(Array.isArray(t))return t.map(x=>String(x).trim()).filter(Boolean); return String(t).split(",").map(x=>x.trim()).filter(Boolean); }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fmtNum(n){
  n=Number(n||0);
  if(n>=1000000) return(n/1000000).toFixed(1).replace(/\.0$/,"")+"M";
  if(n>=1000) return(n/1000).toFixed(1).replace(/\.0$/,"")+"k";
  return String(n);
}
// Seconds -> "m:ss" (or "h:mm:ss" for 1h+)
function fmtDur(sec){
  sec=Math.max(0,Math.floor(Number(sec)||0));
  const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60;
  if(h) return h+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
  return m+":"+String(s).padStart(2,"0");
}

// Save scroll position before leaving
window.addEventListener('beforeunload', () => {
  try { sessionStorage.setItem('indexScrollY', String(window.scrollY)); } catch {}
});
// Restore scroll position on load
window.addEventListener('load', () => {
  try {
    const y = sessionStorage.getItem('indexScrollY');
    if (y) { setTimeout(() => window.scrollTo(0, parseInt(y, 10)), 100); sessionStorage.removeItem('indexScrollY'); }
  } catch {}
});

updFavCt();
load();
</script>
